<!DOCTYPE html>
<html lang="en">
<head>
<link rel="preconnect" href="https://api.fontshare.com">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collection — Beardos</title>


<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1B2540;--bg2:#212E4A;--bg3:#273455;--bg4:#2D3C62;
  --text:#F5F0E8;--text2:#D8D0C4;--muted:#94A378;--muted2:#6b7d5e;
  --accent:#E5BA41;--accent2:#D1855C;--accent3:#c99a2e;
  --border:rgba(229,186,65,.07);--border2:rgba(229,186,65,.13);
  --serif:'Clash Display','Noto Sans KR',sans-serif;
  --sans:'Space Grotesk','Noto Sans KR',sans-serif;--serif-kr:'Noto Sans KR',sans-serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-weight:300;line-height:1.6;-webkit-font-smoothing:antialiased}
::selection{background:#9CD5FF;color:#355872}

/* ═══ NAV ═══ */
nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:56px;background:rgba(27,37,64,.97);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:.5px solid var(--border)}
.nav-logo{font-family:var(--serif);font-size:22px;font-weight:600;color:#355872;text-decoration:none;transition:opacity .3s}
.nav-logo:hover{opacity:.7}
.nav-logo i{color:#7AAACE;font-style:italic}
.nav-right{display:flex;align-items:center;gap:28px}
.nav-links{display:flex;gap:24px;list-style:none}
.nav-links a{font-size:11px;font-weight:400;letter-spacing:.14em;text-transform:uppercase;color:rgba(229,186,65,.5);text-decoration:none;transition:color .3s}
.nav-links a:hover{color:var(--text)}
.nav-links a.active{color:var(--accent)}
.lang-toggle{display:flex;border:.5px solid rgba(229,186,65,.15);border-radius:20px;overflow:hidden}
.lang-toggle button{padding:4px 12px;background:none;border:none;color:rgba(229,186,65,.4);cursor:pointer;transition:all .25s;font-family:var(--sans);font-size:10px;font-weight:500;letter-spacing:.1em}
.lang-toggle button.active{background:#355872;color:#F7F8F0;border-radius:20px}

/* ═══ PAGE HEADER ═══ */
.page-header{padding:88px 40px 0;max-width:1400px;margin:0 auto;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:16px}
.page-header-left{}
.page-title{font-family:var(--serif);font-size:32px;font-weight:300;letter-spacing:-.01em;line-height:1.2}
.page-title em{font-style:italic;color:var(--accent)}
.page-desc{font-size:13px;color:var(--muted);margin-top:6px}

/* ═══ TOOLBAR ═══ */
.toolbar{display:flex;align-items:center;justify-content:space-between;padding:20px 40px 16px;max-width:1400px;margin:0 auto;border-bottom:.5px solid var(--border);flex-wrap:wrap;gap:12px}
.filter-tabs{display:flex;gap:0}
.filter-tab{padding:6px 16px;border:none;background:none;font-family:var(--sans);font-size:11px;font-weight:400;letter-spacing:.08em;color:var(--muted);cursor:pointer;transition:all .2s;text-transform:uppercase;border-bottom:2px solid transparent}
.filter-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
.filter-tab:hover:not(.active){color:var(--text)}
.toolbar-right{display:flex;align-items:center;gap:16px}
.work-count{font-size:12px;color:var(--muted2);letter-spacing:.04em}
.sort-btn{background:none;border:none;font-family:var(--sans);font-size:11px;color:var(--muted);cursor:pointer;letter-spacing:.06em;text-transform:uppercase;transition:color .2s;padding:4px 0}
.sort-btn:hover{color:var(--accent)}
.sort-btn .arrow{display:inline-block;margin-left:4px;transition:transform .2s}
.sort-btn.desc .arrow{transform:rotate(180deg)}

/* ═══ POSTER GRID — Letterboxd style ═══ */
.grid-wrap{max-width:1400px;margin:0 auto;padding:24px 40px 80px}
.poster-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:8px}

/* ═══ POSTER CARD ═══ */
.poster-card{position:relative;border-radius:3px;overflow:hidden;cursor:pointer;opacity:0;animation:posterIn .4s var(--ease) forwards}
.poster-card:nth-child(1){animation-delay:.02s}.poster-card:nth-child(2){animation-delay:.04s}.poster-card:nth-child(3){animation-delay:.06s}.poster-card:nth-child(4){animation-delay:.08s}.poster-card:nth-child(5){animation-delay:.1s}.poster-card:nth-child(6){animation-delay:.12s}.poster-card:nth-child(7){animation-delay:.14s}.poster-card:nth-child(8){animation-delay:.16s}.poster-card:nth-child(9){animation-delay:.18s}.poster-card:nth-child(10){animation-delay:.2s}.poster-card:nth-child(11){animation-delay:.22s}.poster-card:nth-child(12){animation-delay:.24s}.poster-card:nth-child(13){animation-delay:.26s}.poster-card:nth-child(14){animation-delay:.28s}.poster-card:nth-child(15){animation-delay:.3s}.poster-card:nth-child(16){animation-delay:.32s}

.poster-card .poster-img{aspect-ratio:2/3;display:block;width:100%;background:var(--bg3);position:relative;border:1px solid var(--border);border-radius:3px;overflow:hidden;transition:border-color .3s,box-shadow .3s}
.poster-card:hover .poster-img{border-color:var(--accent3);box-shadow:0 4px 20px rgba(45,60,89,.15)}
.poster-card .poster-img img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .4s var(--ease)}
.poster-card:hover .poster-img img{transform:scale(1.03)}
.poster-fb{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:13px;font-style:italic;color:rgba(229,186,65,.06);text-align:center;padding:12px;line-height:1.3}

/* Hover overlay — Letterboxd style tooltip */
.poster-tooltip{position:absolute;bottom:0;left:0;right:0;padding:10px 8px 8px;background:linear-gradient(transparent,rgba(45,60,89,.95) 40%);opacity:0;transition:opacity .3s;pointer-events:none}
.poster-card:hover .poster-tooltip{opacity:1}
.poster-tooltip-title{font-size:11px;font-weight:400;color:#F7F8F0;line-height:1.3;margin-bottom:2px}
.poster-tooltip-year{font-size:10px;color:#9CD5FF;font-family:var(--serif);font-style:italic}

/* Spine number — subtle top-left */
.poster-spine{position:absolute;top:6px;left:6px;font-family:var(--serif);font-size:9px;color:rgba(229,186,65,.25);letter-spacing:.08em;z-index:2;transition:color .3s}
.poster-card:hover .poster-spine{color:var(--accent)}

/* Genre dot */
.poster-genre{position:absolute;top:6px;right:6px;font-size:7px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;padding:2px 6px;border-radius:1px;background:rgba(45,60,89,.7);color:var(--accent);z-index:2;opacity:0;transition:opacity .3s}
.poster-card:hover .poster-genre{opacity:1}

/* Links on click/hover */
.poster-links{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);display:flex;gap:6px;opacity:0;transition:opacity .3s;z-index:3}
.poster-card:hover .poster-links{opacity:1}
.poster-link{padding:5px 12px;border-radius:2px;font-size:9px;font-weight:600;letter-spacing:.06em;text-decoration:none;text-transform:uppercase;transition:all .2s;backdrop-filter:blur(4px)}
.poster-link:hover{filter:brightness(1.2);transform:scale(1.05)}

.poster-card.hidden{display:none!important}

/* Gradients */
.g1{background:linear-gradient(145deg,#2a4a62,#355872 50%,#1e3a50)}.g2{background:linear-gradient(145deg,#3a5a72,#2a4a62 50%,#1e3a50)}.g3{background:linear-gradient(145deg,#4a6a82,#355872 50%,#2a4a62)}.g4{background:linear-gradient(145deg,#5a8aae,#7AAACE 50%,#4a7a9e)}.g5{background:linear-gradient(145deg,#6a9abe,#7AAACE 50%,#5a8aae)}.g6{background:linear-gradient(145deg,#355872,#4a7a9e 50%,#2a4a62)}.g7{background:linear-gradient(145deg,#7AAACE,#9CD5FF 50%,#6a9abe)}.g8{background:linear-gradient(145deg,#4a6a82,#5a8aae 50%,#3a5a72)}.g9{background:linear-gradient(145deg,#2a4a62,#3a5a72 50%,#1e3a50)}.g10{background:linear-gradient(145deg,#5a8aae,#7AAACE 50%,#4a7a9e)}.g11{background:linear-gradient(145deg,#355872,#2a4a62 50%,#1e3a50)}.g12{background:linear-gradient(145deg,#4a7a9e,#355872 50%,#2a4a62)}.g13{background:linear-gradient(145deg,#6a9abe,#5a8aae 50%,#4a6a82)}.g14{background:linear-gradient(145deg,#9CD5FF,#7AAACE 50%,#6a9abe)}.g15{background:linear-gradient(145deg,#3a5a72,#4a6a82 50%,#2a4a62)}

/* ═══ FOOTER ═══ */
footer{padding:32px 40px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;max-width:1400px;margin:0 auto}
.footer-logo{font-family:var(--serif);font-size:18px;font-weight:700;color:var(--muted2);text-decoration:none}
.footer-copy{font-size:11px;color:var(--muted2);letter-spacing:.06em}

@keyframes posterIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1200px){
  .poster-grid{grid-template-columns:repeat(6,1fr)}
}
@media(max-width:900px){
  .poster-grid{grid-template-columns:repeat(4,1fr);gap:6px}
  nav{padding:0 20px}
  .nav-links{display:none}
  .page-header{padding:76px 20px 0}
  .toolbar{padding:16px 20px 12px}
  .grid-wrap{padding:16px 20px 60px}
  footer{padding:24px 20px;flex-direction:column;gap:8px;text-align:center}
}
@media(max-width:540px){
  .poster-grid{grid-template-columns:repeat(3,1fr);gap:5px}
  .page-title{font-size:24px}
}
#moreBtn:hover{border-color:rgba(240,235,224,.5);color:var(--text)}
/* ═══ LIGHTBOX ═══ */
.lightbox{position:fixed;inset:0;background:rgba(10,15,30,.92);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .3s;backdrop-filter:blur(8px)}
.lightbox.open{opacity:1;pointer-events:all}
.lightbox-img{max-height:90vh;max-width:min(420px,90vw);border-radius:6px;box-shadow:0 40px 80px rgba(0,0,0,.6);transform:scale(.94);transition:transform .35s cubic-bezier(.25,.46,.45,.94);object-fit:contain}
.lightbox.open .lightbox-img{transform:scale(1)}
.lightbox-close{position:fixed;top:24px;right:28px;width:40px;height:40px;border-radius:50%;background:rgba(240,235,224,.1);border:1px solid rgba(240,235,224,.2);color:#F0EBE0;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s;line-height:1}
.lightbox-close:hover{background:rgba(240,235,224,.2)}
.lightbox-meta{position:fixed;bottom:32px;left:0;right:0;text-align:center;color:rgba(240,235,224,.7);font-size:13px;letter-spacing:.06em}
.lightbox-nav{position:fixed;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:50%;background:rgba(240,235,224,.1);border:1px solid rgba(240,235,224,.2);color:#F0EBE0;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
.lightbox-nav:hover{background:rgba(240,235,224,.2)}
.lightbox-nav.prev{left:20px}
.lightbox-nav.next{right:20px}
.lightbox-nav.hidden{opacity:0;pointer-events:none}
</style>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=Noto+Sans+KR:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">Beardos<i>.</i></a>
  <div class="nav-right">
    <ul class="nav-links">
      <li><a href="collection.html" class="active"><span class="lang-ko" style="display:none">컬렉션</span><span class="lang-en">Collection</span></a></li>
      <li><a href="index.html#about"><span class="lang-ko" style="display:none">소개</span><span class="lang-en">About</span></a></li>
      <li><a href="index.html#contact"><span class="lang-ko" style="display:none">의뢰</span><span class="lang-en">Contact</span></a></li>
    </ul>
    <div class="lang-toggle">
      <button onclick="setLang('ko')">KO</button>
      <button class="active" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<section class="page-header">
  <div class="page-header-left">
    <h1 class="page-title">
      <span class="lang-ko" style="display:none"><em>컬렉션</em></span>
      <span class="lang-en"><em>Collection</em></span>
    </h1>
    <p class="page-desc">
      <span class="lang-ko" style="display:none">흰수염 번역단이 작업한 모든 작품.</span>
      <span class="lang-en">Every work translated by Beardos.</span>
    </p>
  </div>
</section>

<div class="toolbar">
  <div class="filter-tabs">
    <button class="filter-tab" onclick="filter('all')">
      <span class="lang-ko" style="display:none">전체</span><span class="lang-en">All</span>
    </button>
    <button class="filter-tab active" onclick="filter('영화')">
      <span class="lang-ko" style="display:none">영화</span><span class="lang-en">Film</span>
    </button>
    <button class="filter-tab" onclick="filter('공연')">
      <span class="lang-ko" style="display:none">공연</span><span class="lang-en">Theatre</span>
    </button>
    <button class="filter-tab" onclick="filter('책')">
      <span class="lang-ko" style="display:none">책</span><span class="lang-en">Book</span>
    </button>

  </div>
  <div class="toolbar-right">
    <span class="work-count" id="workCount"></span>
    <button class="sort-btn desc" id="sortBtn" onclick="toggleSort()">
      <span class="lang-ko" style="display:none">최신순</span><span class="lang-en">Newest</span>
      <span class="arrow">▲</span>
    </button>
  </div>
</div>

<section class="grid-wrap">
  <div class="poster-grid" id="posterGrid"></div>
  <div id="moreWrap" style="display:none;text-align:center;padding:40px 0 20px">
    <button id="moreBtn" onclick="loadMore()" style="padding:12px 36px;background:transparent;border:1px solid rgba(240,235,224,.2);border-radius:4px;color:var(--muted);font-family:var(--sans);font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;cursor:pointer;transition:all .25s">
      <span class="lang-ko" style="display:none">더 보기</span>
      <span class="lang-en">More</span>
      <span id="moreCount" style="color:rgba(240,235,224,.35);margin-left:8px"></span>
    </button>
  </div>
</section>

<footer>
  <a href="index.html" class="footer-logo">Beardos.</a>
  <span class="footer-copy lang-ko" style="display:none">© 2025 흰수염 번역단. All rights reserved.</span>
  <span class="footer-copy lang-en">© 2025 Beardos. All rights reserved.</span>
</footer>

<script>
/* ═══ API KEYS ═══ */
const TMDB_KEY = localStorage.getItem('beardos_tmdb_key') || '953ab5c0680706b5f7447d45b19ca8f1';
const TP = 'https://image.tmdb.org/t/p/w342';
const KOPIS_KEY = '80eee61339564315aef9acfd05e32945';
const ALADIN_KEY = 'ttbsuky79.shopping0154001';

const GE = {영화:'Film',뮤지컬:'Musical',연극:'Theatre',책:'Book',저서:'Authored'};

let W = [];
let lang = 'en', currentFilter = '영화', sortNewest = true;

/* ═══ LOAD DATA ═══ */
async function init(){
  try{
    const r = await fetch('works.json?v='+Date.now());
    W = await r.json();
  }catch(e){ W = []; }
  renderGrid();
  await Promise.all([loadTMDB(), loadKOPIS(), loadAladin()]);
}

/* ═══ TMDB (영화) ═══ */
async function loadTMDB(){
  if(!TMDB_KEY) return;
  await Promise.all(W.filter(w=>w.t).map(async w=>{
    try{
      const r = await fetch(`https://api.themoviedb.org/3/movie/${w.t}?api_key=${TMDB_KEY}&language=ko-KR`);
      const d = await r.json();
      // works.json에 저장된 포스터가 있으면 우선 사용, 없을 때만 TMDB에서 가져옴
      if(!w.poster && d.poster_path) w.poster = TP + d.poster_path;
    }catch(e){}
  }));
  renderGrid();
}

/* ═══ KOPIS (뮤지컬·연극) ═══ */
async function loadKOPIS(){
  if(!KOPIS_KEY) return;
  const perfs = W.filter(w=>(w.g==='뮤지컬'||w.g==='연극')&&!w.poster);
  await Promise.all(perfs.map(async w=>{
    try{
      let posterUrl = null;
      if(w.kid){
        const r = await fetch(`https://www.kopis.or.kr/openApi/restful/pblprfr/${w.kid}?service=${KOPIS_KEY}`);
        const xml = await r.text();
        const doc = new DOMParser().parseFromString(xml,'text/xml');
        posterUrl = doc.querySelector('poster')?.textContent||null;
      } else {
        const q = encodeURIComponent(w.ko);
        const r = await fetch(`https://www.kopis.or.kr/openApi/restful/pblprfr?service=${KOPIS_KEY}&stdate=20000101&eddate=20301231&shprfnm=${q}&cpage=1&rows=1`);
        const xml = await r.text();
        const doc = new DOMParser().parseFromString(xml,'text/xml');
        posterUrl = doc.querySelector('poster')?.textContent||null;
        const id = doc.querySelector('mt20id')?.textContent;
        if(id) w.kid = id;
      }
      if(posterUrl) w.poster = posterUrl.replace(/^http:/,'https:');
    }catch(e){}
  }));
  renderGrid();
}

/* ═══ ALADIN (책·저서) ═══ */
async function loadAladin(){
  if(!ALADIN_KEY) return;
  const books = W.filter(w=>(w.g==='책'||w.g==='저서')&&!w.poster);
  await Promise.all(books.map(async w=>{
    try{
      let url;
      if(w.isbn){
        url = `https://www.aladin.co.kr/ttb/api/ItemLookUp.aspx?ttbkey=${ALADIN_KEY}&itemIdType=ISBN13&ItemId=${w.isbn}&output=js&Version=20131101&Cover=Big`;
      } else {
        const q = encodeURIComponent(w.ko);
        url = `https://www.aladin.co.kr/ttb/api/ItemSearch.aspx?ttbkey=${ALADIN_KEY}&Query=${q}&QueryType=Title&MaxResults=1&SearchTarget=Book&output=js&Version=20131101&Cover=Big`;
      }
      const r = await fetch(url);
      const d = await r.json();
      if(d.item?.[0]?.cover) w.poster = d.item[0].cover;
    }catch(e){}
  }));
  renderGrid();
}

/* ═══ RENDER ═══ */
const PAGE_SIZE = 32;
let currentPage = 1;
let currentItems = [];

function renderGrid(){
  currentPage = 1;
  let items = [...W];
  if(currentFilter === '공연') items = items.filter(w=>w.g==='뮤지컬'||w.g==='연극');
  else if(currentFilter === '책') items = items.filter(w=>w.g==='책'||w.g==='저서');
  else if(currentFilter !== 'all') items = items.filter(w=>w.g===currentFilter);
  if(sortNewest) items.sort((a,b)=>b.y-a.y);
  else items.sort((a,b)=>a.y-b.y);
  currentItems = items;

  const grid = document.getElementById('posterGrid');
  grid.innerHTML = buildCards(items.slice(0, PAGE_SIZE));

  updateMoreBtn(items.length);
  document.getElementById('workCount').textContent =
    '';
}

function loadMore(){
  currentPage++;
  const end = currentPage * PAGE_SIZE;
  const newCards = buildCards(currentItems.slice((currentPage-1)*PAGE_SIZE, end));
  document.getElementById('posterGrid').insertAdjacentHTML('beforeend', newCards);
  updateMoreBtn(currentItems.length);
}

function updateMoreBtn(total){
  const shown = Math.min(currentPage * PAGE_SIZE, total);
  const remaining = total - shown;
  const wrap = document.getElementById('moreWrap');
  const count = document.getElementById('moreCount');
  if(remaining > 0){
    wrap.style.display = '';
    count.textContent = '';
  } else {
    wrap.style.display = 'none';
  }
}

function buildCards(items){
  return items.map(w=>{
    const title = lang==='en' ? w.en : w.ko;
    const badge = lang==='en' ? GE[w.g] : w.g;
    const imgHtml = w.poster
      ? `<img src="${w.poster}" alt="${w.en}" loading="lazy">`
      : `<div class="poster-fb ${w.gr}">${w.en}</div>`;
    const linksHtml = (w.lk||[]).map(l=>
      `<a class="poster-link" href="${l.u}" target="_blank" onclick="event.stopPropagation()" style="background:${l.bg};color:${l.c}">${l.n}</a>`
    ).join('');
    return `
    <div class="poster-card" onclick="openLightbox(${JSON.stringify(w).replace(/"/g,'&quot;')})">
      <div class="poster-img">
        <span class="poster-spine">${w.s}</span>
        ${imgHtml}
        <span class="poster-genre">${badge}</span>
        ${linksHtml?`<div class="poster-links">${linksHtml}</div>`:''}
        <div class="poster-tooltip">
          <div class="poster-tooltip-title">${title}</div>
          <div class="poster-tooltip-year">${w.y} · ${w.sub}</div>
        </div>
      </div>
    </div>`;
  }).join('');
}


function filter(genre){
  currentFilter = genre;
  const genres = ['all','영화','공연','책'];
  document.querySelectorAll('.filter-tab').forEach((t,i)=>
    t.classList.toggle('active',genres[i]===genre)
  );
  renderGrid();
}

/* ═══ SORT ═══ */
function toggleSort(){
  sortNewest = !sortNewest;
  const btn = document.getElementById('sortBtn');
  btn.classList.toggle('desc',sortNewest);
  const koLabel = sortNewest ? '최신순' : '오래된순';
  const enLabel = sortNewest ? 'Newest' : 'Oldest';
  btn.innerHTML = `<span class="lang-ko" style="${lang==='ko'?'':'display:none'}">${koLabel}</span><span class="lang-en" style="${lang==='en'?'':'display:none'}">${enLabel}</span><span class="arrow">▲</span>`;
  renderGrid();
}

/* ═══ LANG ═══ */
function setLang(l){
  lang = l;
  document.querySelectorAll('.lang-toggle button').forEach((b,i)=>
    b.classList.toggle('active',(i===0&&l==='ko')||(i===1&&l==='en'))
  );
  document.querySelectorAll('.lang-ko').forEach(e=>e.style.display=l==='ko'?'':'none');
  document.querySelectorAll('.lang-en').forEach(e=>e.style.display=l==='en'?'':'none');
  document.documentElement.lang = l;
  renderGrid();
}

/* ═══ INIT ═══ */
init();
</script>
<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <button class="lightbox-nav prev" id="lbPrev" onclick="lbNav(-1);event.stopPropagation()">&#8249;</button>
  <img class="lightbox-img" id="lbImg" src="" alt="">
  <button class="lightbox-nav next" id="lbNext" onclick="lbNav(1);event.stopPropagation()">&#8250;</button>
  <div class="lightbox-meta" id="lbMeta"></div>
</div>

<script>
let _lbIdx = 0;

function openLightbox(w){
  _lbIdx = currentItems.findIndex(x => x.s === w.s);
  renderLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function renderLightbox(){
  const w = currentItems[_lbIdx];
  if(!w) return;
  const img = document.getElementById('lbImg');
  img.src = w.poster || '';
  img.style.display = w.poster ? '' : 'none';
  const title = lang==='en' ? w.en : w.ko;
  document.getElementById('lbMeta').textContent = `${title}  ·  ${w.y}`;
  document.getElementById('lbPrev').classList.toggle('hidden', _lbIdx === 0);
  document.getElementById('lbNext').classList.toggle('hidden', _lbIdx === currentItems.length - 1);
}

function closeLightbox(e){
  if(e && e.target !== document.getElementById('lightbox') && !e.target.classList.contains('lightbox-close')) return;
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function lbNav(dir){
  _lbIdx = Math.min(Math.max(_lbIdx + dir, 0), currentItems.length - 1);
  const img = document.getElementById('lbImg');
  img.style.transform = 'scale(0.94)';
  setTimeout(()=>{ renderLightbox(); img.style.transform = ''; }, 150);
}

document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if(!lb.classList.contains('open')) return;
  if(e.key === 'Escape') { lb.classList.remove('open'); document.body.style.overflow=''; }
  if(e.key === 'ArrowLeft') lbNav(-1);
  if(e.key === 'ArrowRight') lbNav(1);
});
</script>

</body>
</html>
